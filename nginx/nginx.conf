# nginx/nginx.conf
# ─────────────────────────────────────────────────────────────────────────────
# Reverse proxy for the Task Queue API.
# Listens on port 80, forwards to the `api` container on port 8000.
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;          # one process per CPU core

events {
    worker_connections 1024;    # max simultaneous connections per worker
    use epoll;                  # efficient on Linux
}

http {
    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Upstream — Docker Compose resolves "api" to the api container ─────────
    upstream api_backend {
        server api:8000;

        # Round-robin across multiple replicas if you scale the api service:
        #   docker compose up --scale api=3
        # Additional entries are added automatically when you scale.
        keepalive 32;           # reuse connections to the upstream
    }

    # ── Server block ──────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;          # catch-all

        # Forward all requests to the FastAPI app
        location / {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;

            # Headers required for proper proxying
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";   # enable keepalive upstream

            # Timeouts — increase for long-running task submissions
            proxy_connect_timeout 10s;
            proxy_read_timeout    120s;
            proxy_send_timeout    30s;

            # Buffer settings
            proxy_buffering    on;
            proxy_buffer_size  4k;
            proxy_buffers      8 4k;
        }

        # Health check endpoint — Nginx itself responds to /ping
        location = /ping {
            access_log off;
            return 200 "pong\n";
            add_header Content-Type text/plain;
        }
    }
}
